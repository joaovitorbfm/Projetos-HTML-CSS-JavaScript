<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animação de Drone Interativa</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <div id="banner">
        <div id="drone-box">
            <img src="img/drone.png" class="drone-pic">
            <img src="img/drone-left.png" class="left-pic">
            <img src="img/drone-right.png" class="right-pic">
        </div>
    </div>

    <script>
        $(document).ready(function(){
            $('#banner').mousemove(function(e){
                // Lógica para calcular o movimento baseado no cursor
                var moveX = (e.pageX * -1 / 2) + 300;
                var moveY = (e.pageY * -1 / 3) + 120;

                // Aplica a transformação ao drone-box
                $('#drone-box').css('transform', 'translate3d(' + moveX + 'px, ' + moveY + 'px, 0)');
            });
        });
    </script>
</body>
</html>
