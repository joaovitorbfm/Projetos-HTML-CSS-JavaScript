<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card UI Design</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <section class="container">
        <div class="card">
            <div class="card-inner">
                <div class="front">
                    <img src="img/chip.png" class="chip" alt="chip">
                    <div class="card-no">#### #### #### ####</div>
                    <div class="card-holder">NOME DO TITULAR</div>
                    <div class="valid-thru">
                        <span class="label">VALID THRU</span>
                        <span class="date">MM/AA</span>
                    </div>
                    <img src="img/logo.png" class="logo" alt="logo">
                </div>

                <div class="back">
                    <div class="bar"></div>
                    <div class="cvv-section">
                        <div class="cvv-bar">***</div>
                    </div>
                    <img src="img/logo.png" class="logo" alt="logo">
                </div>
            </div>
        </div>
    </section>
</body>
</html>
