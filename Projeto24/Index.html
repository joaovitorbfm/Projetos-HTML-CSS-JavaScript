<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design de Website - Smartphone</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="main">
        <nav>
            <div class="logo">
                <img src="img/logo.png" alt="Logo RealPhone">
            </div>
            <div class="nav-links">
                <ul>
                    <li><a href="#">Início</a></li>
                    <li><a href="#">Celulares</a></li>
                    <li><a href="#">Acessórios</a></li>
                    <li><a href="#">Carrinho</a></li>
                </ul>
            </div>
        </nav>

        <div class="information">
            <div class="overlay"></div>
            <img src="img/mobile.png" class="mobile" alt="Smartphone">
            
            <div id="circle">
                <div class="feature one">
                    <img src="img/camera.png" alt="Câmera">
                    <div>
                        <h1>Câmera</h1>
                        <p>12MP, Lente Grande Angular</p>
                    </div>
                </div>
                <div class="feature two">
                    <img src="img/processor.png" alt="Processador">
                    <div>
                        <h1>Processador</h1>
                        <p>Snapdragon Octa-core 11nm</p>
                    </div>
                </div>
                <div class="feature three">
                    <img src="img/display.png" alt="Tela">
                    <div>
                        <h1>Tela</h1>
                        <p>6.5" Tela Cheia</p>
                    </div>
                </div>
                <div class="feature four">
                    <img src="img/battery.png" alt="Bateria">
                    <div>
                        <h1>Bateria</h1>
                        <p>5000mAh, 720Hrs Standby</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="controls">
            <img src="img/arrow.png" id="upBtn" alt="Seta Cima">
            <h3>Funcionalidades</h3>
            <img src="img/arrow.png" id="downBtn" alt="Seta Baixo">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
