<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter Box</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
</head>
<body>
    <div class="wrapper">
        <div class="content">
            <header>Newsletter</header>
            <p>Subscreva a nossa newsletter para receber as últimas atualizações diretamente no seu e-mail.</p>
        </div>
        <form action="#">
            <div class="field">
                <i class="fas fa-envelope"></i>
                <input type="email" placeholder="Introduza o seu e-mail" required>
            </div>
            <div class="field">
                <input type="submit" value="Subscrever">
            </div>
        </form>
        <div class="text">Não partilhamos os seus dados com terceiros.</div>
    </div>
</body>
</html>
