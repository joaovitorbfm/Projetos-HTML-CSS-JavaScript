<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar Simples | CodingLab</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="img/image.png" alt="logo">
            <h2>CodingLab</h2>
        </div>
        <ul class="sidebar-links">
            <h4><span>Menu Principal</span></h4>
            <li>
                <a href="#"><i class="bi bi-speedometer2"></i>Dashboard</a>
            </li>
            <li>
                <a href="#"><i class="bi bi-graph-up"></i>Estatísticas</a>
            </li>
            <li>
                <a href="#"><i class="bi bi-people-fill"></i>Usuários</a>
            </li>
            <h4><span>Geral</span></h4>
            <li>
                <a href="#"><i class="bi bi-gear-fill"></i>Configurações</a>
            </li>
            <li>
                <a href="#"><i class="bi bi-bell-fill"></i>Notificações</a>
            </li>
            <li>
                <a href="#"><i class="bi bi-box-arrow-right"></i>Sair</a>
            </li>
        </ul>
        <div class="user-account">
            <div class="user-profile">
                <i class="bi bi-person-circle"></i>
                <div class="user-detail">
                    <h3>João Bonfim</h3>
                    <span>Web Developer</span>
                </div>
            </div>
        </div>
    </aside>
</body>
</html>
