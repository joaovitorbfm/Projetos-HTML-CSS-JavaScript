<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar Simples | CodingLab</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header">
            <img src="logo.png" alt="logo">
            <h2>CodingLab</h2>
        </div>
        <ul class="sidebar-links">
            <h4><span>Menu Principal</span></h4>
            <li>
                <a href="#"><span class="material-symbols-outlined">dashboard</span>Dashboard</a>
            </li>
            <li>
                <a href="#"><span class="material-symbols-outlined">show_chart</span>Estatísticas</a>
            </li>
            <li>
                <a href="#"><span class="material-symbols-outlined">group</span>Usuários</a>
            </li>
            <h4><span>Geral</span></h4>
            <li>
                <a href="#"><span class="material-symbols-outlined">settings</span>Configurações</a>
            </li>
            <li>
                <a href="#"><span class="material-symbols-outlined">notifications</span>Notificações</a>
            </li>
            <li>
                <a href="#"><span class="material-symbols-outlined">logout</span>Sair</a>
            </li>
        </ul>
        <div class="user-account">
            <div class="user-profile">
                <img src="profile.jpg" alt="profile">
                <div class="user-detail">
                    <h3>Alex Johnson</h3>
                    <span>Web Developer</span>
                </div>
            </div>
        </div>
    </aside>
</body>
</html>
