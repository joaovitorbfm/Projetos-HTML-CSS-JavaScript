<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card de Produto UI Design</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
</head>
<body>
    <div class="product-card">
        <div class="logo-cart">
            <img src="img/logo.png" alt="logo">
            <i class="fas fa-shopping-cart"></i>
        </div>
        <div class="main-images">
            <img id="blue" class="shoe blue active" src="img/image.png" alt="blue">
        </div>
        <div class="shoe-details">
            <span class="shoe_name">Nike Air Max 95</span>
            <p>Um tênis de alta performance com amortecimento superior e design moderno para o seu dia a dia.</p>
            <div class="stars">
                <i class="fas fa-star"></i>
                <i class="fas fa-star"></i>
                <i class="fas fa-star"></i>
                <i class="fas fa-star"></i>
                <i class="far fa-star"></i>
            </div>
        </div>
        <div class="color-price">
            <div class="color-option">
                <span class="color">Cor:</span>
                <div class="circles">
                    <span class="circle blue active" id="blue"></span>
                    <span class="circle pink" id="pink"></span>
                    <span class="circle yellow" id="yellow"></span>
                </div>
            </div>
            <div class="price">
                <span class="price_num">R$ 599,00</span>
            </div>
        </div>
        <div class="button">
            <div class="button-layer"></div>
            <button>Adicionar ao Carrinho</button>
        </div>
    </div>
</body>
</html>
