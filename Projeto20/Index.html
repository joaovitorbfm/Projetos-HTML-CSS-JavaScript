<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Skills Bar</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="skills-container">
        <h2>Minhas Competências</h2>
        
        <div class="skill-box">
            <span class="title">HTML & CSS</span>
            <div class="skill-bar">
                <span class="skill-per html-css">
                    <span class="tooltip">90%</span>
                </span>
            </div>
        </div>

        <div class="skill-box">
            <span class="title">JavaScript</span>
            <div class="skill-bar">
                <span class="skill-per javascript">
                    <span class="tooltip">75%</span>
                </span>
            </div>
        </div>

        <div class="skill-box">
            <span class="title">React / Next.js</span>
            <div class="skill-bar">
                <span class="skill-per react">
                    <span class="tooltip">85%</span>
                </span>
            </div>
        </div>

        <div class="skill-box">
            <span class="title">Python</span>
            <div class="skill-bar">
                <span class="skill-per python">
                    <span class="tooltip">60%</span>
                </span>
            </div>
        </div>
    </div>
</body>
</html>
